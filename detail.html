<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Detalles del Personaje</title>
<link rel="stylesheet" href="style.css">
<style>
    .detail-container {
        max-width: 800px;
        margin: 20px auto;
        padding: 20px;
        background-color: #1a1a1a;
        border-radius: 10px;
        color: #fff;
    }

    .detail-header {
        display: flex;
        gap: 30px;
        margin-bottom: 30px;
    }

    .detail-image {
        flex-shrink: 0;
    }

    .detail-image img {
        width: 300px;
        height: 400px;
        object-fit: cover;
        border-radius: 10px;
    }

    .detail-info h2 {
        font-size: 2.5em;
        margin: 0 0 15px 0;
        color: #ff0000;
    }

    .detail-info p {
        margin: 10px 0;
        font-size: 1.1em;
    }

    .detail-info strong {
        color: #ff0000;
    }

    .detail-description {
        margin-top: 30px;
        padding: 20px;
        background-color: #2a2a2a;
        border-left: 4px solid #ff0000;
        border-radius: 5px;
    }

    .detail-description h3 {
        margin-top: 0;
        color: #ff0000;
    }

    .back-button {
        display: inline-block;
        margin: 20px 0;
        padding: 10px 20px;
        background-color: #ff0000;
        color: white;
        text-decoration: none;
        border-radius: 5px;
        cursor: pointer;
        border: none;
        font-size: 1em;
    }

    .back-button:hover {
        background-color: #cc0000;
    }

    .loading {
        text-align: center;
        font-size: 1.2em;
        color: #ff0000;
    }
</style>
</head>

<body>

<h1><img src="LOGO.gif" alt="Demon Slayer" style="max-width: 200px;"></h1>

<button class="back-button" onclick="window.location.href='index.html'">Volver a Personajes</button>

<div class="detail-container" id="detailContainer">
    <div class="loading">Cargando...</div>
</div>

<script src="detail.js"></script>

</body>
</html>
